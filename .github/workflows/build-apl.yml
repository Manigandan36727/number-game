name: Build Android APK

on:
  push:
    branches: [ master ]
  workflow_dispatch:
    inputs:
      version:
        description: 'App Version'
        required: true
        default: '1.0.0'

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install Dependencies
        run: |
          cd client
          npm install

      - name: Update Server URL
        run: |
          cd client/src
          sed -i "s|const SOCKET_URL = 'http://localhost:5000';|const SOCKET_URL = 'https://number-game-server.onrender.com';|g" App.js
          echo "✅ Updated server URL to: https://number-game-server.onrender.com"

      - name: Build React App
        run: |
          cd client
          npm run build
          echo "✅ React app built successfully"

      - name: Setup Capacitor
        run: |
          cd client
          npm install @capacitor/core @capacitor/cli @capacitor/android
          npx cap init NumberGuessingGame com.manigandan.numbergame --web-dir build
          echo "{
            \"appId\": \"com.manigandan.numbergame\",
            \"appName\": \"Number Guessing Game\",
            \"webDir\": \"build\",
            \"bundledWebRuntime\": false,
            \"server\": {
              \"url\": \"https://number-game-server.onrender.com\",
              \"cleartext\": true
            }
          }" > capacitor.config.json
          npx cap add android
          echo "✅ Capacitor configured"

      - name: Sync with Android
        run: |
          cd client
          npx cap sync
          echo "✅ Synced with Android"

      - name: Build APK
        run: |
          cd client/android
          chmod +x gradlew
          ./gradlew assembleDebug
          echo "✅ APK built successfully"

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Number-Guessing-Game-v${{ github.event.inputs.version || '1.0.0' }}.apk
          path: client/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
